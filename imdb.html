<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMDb Gelişmiş Arama</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

.container {
  padding: 10px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

.row {
  display: flex;
  gap: 5px;
  margin-bottom: 8px;
}

input {
  flex: 1;
  background: #1a1a1a;
  color: white;
}

select {
  background: #1a1a1a;
  color: white;
}

button {
  background: #f5c518;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

  <!-- 🔍 ARAMA -->
  <div class="row">
    <input id="searchInput" placeholder="Keyword (örn: time travel, revenge)" />
  </div>

  <!-- 📅 YIL -->
  <div class="row">
    <input id="startYear" placeholder="Başlangıç yıl" />
    <input id="endYear" placeholder="Bitiş yıl" />
  </div>

  <!-- 🔽 SIRALAMA -->
  <div class="row">
    <select id="sortSelect">
      <option value="">Popüler</option>
      <option value="year,desc">Yeni → Eski</option>
      <option value="year,asc">Eski → Yeni</option>
      <option value="user_rating,desc">En yüksek puan</option>
      <option value="num_votes,desc">En çok oy</option>
    </select>

    <button onclick="search()">ARA</button>
  </div>

</div>

<script>
function search() {
  let query = document.getElementById("searchInput").value;
  const startYear = document.getElementById("startYear").value;
  const endYear = document.getElementById("endYear").value;
  const sort = document.getElementById("sortSelect").value;

  if (!query) return;

  // 🔥 çoklu keyword desteği
  const keyword = query
    .toLowerCase()
    .split(",")
    .map(k => k.trim().replace(/\s+/g, "-"))
    .join(",");

  let url = `https://www.imdb.com/search/title/?keywords=${keyword}&explore=keywords`;

  // 📅 yıl filtresi
  if (startYear && endYear) {
    url += `&release_date=${startYear}-01-01,${endYear}-12-31`;
  } else if (startYear) {
    url += `&release_date=${startYear}-01-01,${startYear}-12-31`;
  } else if (endYear) {
    url += `&release_date=${endYear}-01-01,${endYear}-12-31`;
  }

  // 🔽 sıralama
  if (sort) {
    url += `&sort=${sort}`;
  }

  // 🚀 aç
  window.location.href = url;
}

// Enter ile arama
document.querySelectorAll("input").forEach(el => {
  el.addEventListener("keypress", function(e) {
    if (e.key === "Enter") search();
  });
});
</script>

</body>
</html>
