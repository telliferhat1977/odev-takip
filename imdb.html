<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMDb Gelişmiş Arama</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #000;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    #searchInput {
      flex: 1 1 100%;
    }

    .year-input {
      width: 100px;
      text-align: center;
    }

    select {
      width: 140px;
    }

    button {
      padding: 10px 15px;
      background: #f5c518;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="search-bar">
    <input id="searchInput" placeholder="Keyword (ör: time travel)" />

    <input id="startYear" class="year-input" placeholder="Başlangıç" />
    <input id="endYear" class="year-input" placeholder="Bitiş" />

    <select id="sortSelect">
      <option value="">Popüler</option>
      <option value="year,desc">Yeni → Eski</option>
      <option value="year,asc">Eski → Yeni</option>
      <option value="user_rating,desc">En Yüksek Puan</option>
      <option value="num_votes,desc">En Çok Oy Alan</option>
    </select>

    <button onclick="search()">Ara</button>
  </div>

  <script>
    function search() {
      const query = document.getElementById("searchInput").value;
      const startYear = document.getElementById("startYear").value;
      const endYear = document.getElementById("endYear").value;
      const sort = document.getElementById("sortSelect").value;

      if (!query) return;

      // 🔹 keyword format
      const keyword = query.trim().toLowerCase().replace(/\s+/g, "-");

      let url = `https://www.imdb.com/search/title/?keywords=${keyword}&explore=keywords`;

      // 🔥 yıl filtresi
      if (startYear && endYear) {
        url += `&release_date=${startYear}-01-01,${endYear}-12-31`;
      } 
      else if (startYear && !endYear) {
        url += `&release_date=${startYear}-01-01,${startYear}-12-31`;
      } 
      else if (!startYear && endYear) {
        url += `&release_date=${endYear}-01-01,${endYear}-12-31`;
      }

      // 🔥 sıralama
      if (sort) {
        url += `&sort=${sort}`;
      }

      // 🚀 aç
      window.location.href = url;
    }

    // Enter ile arama
    document.querySelectorAll("input").forEach(el => {
      el.addEventListener("keypress", function(e) {
        if (e.key === "Enter") search();
      });
    });
  </script>

</body>
</html>
