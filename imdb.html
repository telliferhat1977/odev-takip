<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMDb Keyword Arama</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .search-bar {
      display: flex;
      padding: 10px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #f5c518;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="search-bar">
    <input id="searchInput" placeholder="Keyword yaz (ör: time travel)..." />
    <button onclick="search()">Ara</button>
  </div>

  <div class="info">
    Keyword yaz → IMDb’de film ve diziler listelenir 🎬
  </div>

  <script>
    function search() {
      const query = document.getElementById("searchInput").value;
      if (!query) return;

      // 🔹 boşlukları tireye çevir
      const keyword = query.trim().toLowerCase().replace(/\s+/g, "-");

      // 🔥 DOĞRU IMDb keyword arama URL
      const url = `https://www.imdb.com/search/title/?keywords=${keyword}&explore=keywords`;

      // 🔹 sayfayı aç
      window.location.href = url;
    }

    // Enter ile arama
    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") search();
    });
  </script>

</body>
</html>
